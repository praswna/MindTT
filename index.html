<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MindTT</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>* { margin:0; padding:0; box-sizing:border-box; } body { background:#0f172a; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const XP_BASE = 2, XP_SCALE = 1.8, BONUS_PER_LV = 0.03, MAX_BONUS = 0.25, MAX_LV = 10;
    const xpRequired = (lv) => { if (lv <= 1) return XP_BASE; let v = XP_BASE; for (let i=1;i<lv;i++) v=Math.ceil(v*XP_SCALE); return v; };
    const lvBonus = (lv) => Math.min(MAX_BONUS, (lv-1)*BONUS_PER_LV);

    const XP_SKILLS = ['DRIVE','COUNTER_DRIVE','FLICK','CHIQUITA','LOOP','POWER_DRIVE','BH_DRIVE','SMASH','BLOCK','SHORT_BLOCK','LOB','CUT','STOP','PUSH','SERVE_SHORT_BACK','SERVE_LONG_FAST','SERVE_SHORT_TOP','SERVE_SHORT_SIDE','SERVE_LONG_BACK','SERVE_LONG_SIDE','SERVE_SHORT_SIDE_BACK','SERVE_SHORT_SIDE_TOP','SERVE_KNUCKLE','SERVE_DOUBLE_BOUNCE'];
    const SKILL_NAMES = { DRIVE:'드라이브',COUNTER_DRIVE:'카운터',FLICK:'플릭',CHIQUITA:'치키타',LOOP:'루프',POWER_DRIVE:'파워드라이브',BH_DRIVE:'BH드라이브',SMASH:'스매시',BLOCK:'블록',SHORT_BLOCK:'쇼트',LOB:'로빙',CUT:'맞커트',STOP:'스톱',PUSH:'보스커트',SERVE_SHORT_BACK:'짧은하회전',SERVE_LONG_FAST:'빠른롱서브',SERVE_SHORT_TOP:'짧은상회전',SERVE_SHORT_SIDE:'짧은횡회전',SERVE_LONG_BACK:'긴하회전',SERVE_LONG_SIDE:'긴횡회전',SERVE_SHORT_SIDE_BACK:'횡하회전',SERVE_SHORT_SIDE_TOP:'횡상회전',SERVE_KNUCKLE:'너클서브',SERVE_DOUBLE_BOUNCE:'더블바운드' };
    const initSkillData = () => { const d={}; XP_SKILLS.forEach(k=>{d[k]={lv:1,uses:0};}); return d; };

    const SERVES_SHORT = [
      {label:'짧은 하회전',action:'SERVE_SHORT_BACK',color:'#1e40af',sub:'안전/정석'},
      {label:'짧은 상회전',action:'SERVE_SHORT_TOP',color:'#78350f',sub:'커트 함정'},
      {label:'짧은 횡회전',action:'SERVE_SHORT_SIDE',color:'#4c1d95',sub:'방향 혼란'},
      {label:'짧은 횡하회전',action:'SERVE_SHORT_SIDE_BACK',color:'#5b21b6',sub:'복합 회전'},
      {label:'짧은 횡상회전',action:'SERVE_SHORT_SIDE_TOP',color:'#6d28d9',sub:'복합 속임수'},
      {label:'너클 (무회전)',action:'SERVE_KNUCKLE',color:'#374151',sub:'불규칙 바운드'},
      {label:'더블 바운드',action:'SERVE_DOUBLE_BOUNCE',color:'#065f46',sub:'매우 짧게'},
    ];
    const SERVES_LONG = [
      {label:'긴 빠른 상회전',action:'SERVE_LONG_FAST',color:'#7f1d1d',sub:'기습 에이스'},
      {label:'긴 하회전',action:'SERVE_LONG_BACK',color:'#1e3a5f',sub:'낮고 깊게'},
      {label:'긴 횡회전',action:'SERVE_LONG_SIDE',color:'#312e81',sub:'깊은 사이드'},
    ];

    function TableTennisChess() {
      const [gameState, setGameState] = useState('START');
      const [score, setScore] = useState({player:0,opponent:0});
      const [turn, setTurn] = useState('PLAYER');
      const [server, setServer] = useState('PLAYER');
      const [ball, setBall] = useState(null);
      const [pendingAttack, setPendingAttack] = useState(null);
      const [logs, setLogs] = useState([]);
      const [skills, setSkills] = useState(initSkillData());
      const [levelUpFlash, setLevelUpFlash] = useState(null);
      const [serveTab, setServeTab] = useState('SHORT');
      const logsEndRef = useRef(null);

      useEffect(() => { if (logsEndRef.current) logsEndRef.current.scrollIntoView({behavior:'smooth'}); }, [logs]);

      const addLog = (msg, type='system') => setLogs(p=>[...p,{text:msg,type}]);

      const useSkill = (key) => {
        if (!XP_SKILLS.includes(key)) return;
        setSkills(prev => {
          const s = prev[key], newUses = s.uses+1, needed = xpRequired(s.lv);
          if (s.lv < MAX_LV && newUses >= needed) {
            const newLv = s.lv+1, pct = Math.round(lvBonus(newLv)*100);
            setTimeout(() => { addLog(`🆙 [${SKILL_NAMES[key]}] Lv${s.lv}→Lv${newLv}! 성공률 +${pct}%`,'levelup'); setLevelUpFlash({skill:key,newLv}); setTimeout(()=>setLevelUpFlash(null),2000); }, 50);
            return {...prev,[key]:{lv:newLv,uses:0}};
          }
          return {...prev,[key]:{...s,uses:newUses}};
        });
      };

      const applyBonus = (base,key) => Math.min(0.97, base+lvBonus(skills[key]?.lv??1));

      const checkServerChange = (total) => {
        if (total>0 && total%2===0) {
          const ns = server==='PLAYER'?'OPPONENT':'PLAYER';
          setServer(ns); addLog(`🏓 서브권 교대! 현재: ${ns==='PLAYER'?'나':'상대방'}`,'system'); return ns;
        }
        return server;
      };

      const winPoint = (winner) => {
        const ns = {...score,[winner]:score[winner]+1};
        setScore(ns); setBall(null); setPendingAttack(null);
        addLog(`🎉 ${winner==='player'?'득점!':'실점...'} (${ns.player}:${ns.opponent})`,'system');
        if (ns.player>=5) { addLog('🏆 게임 승리!','system'); setGameState('GAME_OVER'); return; }
        if (ns.opponent>=5) { addLog('💀 게임 패배!','system'); setGameState('GAME_OVER'); return; }
        setTurn(checkServerChange(ns.player+ns.opponent));
      };

      const startGame = () => {
        setScore({player:0,opponent:0}); setServer('PLAYER'); setTurn('PLAYER'); setBall(null); setPendingAttack(null);
        setGameState('PLAYING'); setServeTab('SHORT');
        setLogs([{text:'🏁 게임 시작! 스킬을 반복 사용해 레벨업하세요.',type:'system'}]);
      };

      const rc = () => (Math.random()>0.5?0:1);
      const calcChance = (base,fromCol,fromRow,toCol) => {
        if (fromCol!==toCol) return Math.min(0.97,base+0.05);
        return Math.max(0.15,base-(fromRow===3?0.20:0.10));
      };
      const queueAttack = (action,base,label) => setPendingAttack({action,baseChance:applyBonus(base,action),label});

      const executeAttack = (toCol) => {
        if (!pendingAttack||!ball) return;
        const {action,baseChance,label} = pendingAttack;
        const fromCol=ball.col, fromRow=ball.row, isCross=fromCol!==toCol;
        const chance = calcChance(baseChance,fromCol,fromRow,toCol);
        const pct = Math.round(chance*100);
        const dirLabel = isCross?(fromRow===3?`깊은크로스 (${pct}%)`:`크로스 (${pct}%)`): `스트레이트 (${pct}%)`;
        addLog(`나: ${label} → ${dirLabel}`,'player'); setPendingAttack(null); useSkill(action);
        if (Math.random()<chance) {
          addLog('🎲 성공!','player');
          const outSpin = action==='LOOP'?'LOOP_SPIN':action==='POWER_DRIVE'?'POWER_SPIN':'TOPSPIN';
          setBall({row:0,col:toCol,spin:outSpin,fromRow,fromCol}); setTurn('OPPONENT');
        } else {
          const fails={DRIVE:'🎲 네트에 걸립니다.',COUNTER_DRIVE:'🎲 타이밍 실패. 아웃.',FLICK:'🎲 플릭 미스!',CHIQUITA:'🎲 치키타 미스!',LOOP:'🎲 루프 네트!',POWER_DRIVE:'🎲 파워드라이브 아웃!',BH_DRIVE:'🎲 백핸드 미스!',SMASH:'🎲 홈런!'};
          addLog(fails[action]||'🎲 공격 실패.','system'); winPoint('opponent');
        }
      };

      const handlePlayerAction = (action) => {
        if (turn!=='PLAYER') return;
        const col = rc();
        const ATTACK_DEFS = {
          DRIVE:{base:ball?.spin==='BLOCK_RETURN'?0.85:0.70,label:ball?.spin==='BLOCK_RETURN'?'🔥 드라이브(뜬공)':'🔥 드라이브'},
          COUNTER_DRIVE:{base:0.55,label:'🌀 카운터 드라이브'},FLICK:{base:0.60,label:'⚡ 플릭'},
          CHIQUITA:{base:0.55,label:'🎯 치키타'},LOOP:{base:0.65,label:'🌀 루프'},
          POWER_DRIVE:{base:0.60,label:'💥 파워 드라이브'},BH_DRIVE:{base:0.65,label:'🔵 BH 드라이브'},
          SMASH:{base:ball?.spin==='LOB_SPIN'?0.92:ball?.spin==='BLOCK_RETURN'?0.92:0.85,label:'💥 스매시'},
        };
        if (ATTACK_DEFS[action]) { queueAttack(action,ATTACK_DEFS[action].base,ATTACK_DEFS[action].label); return; }
        switch(action) {
          case 'SERVE_SHORT_BACK': useSkill(action);addLog('나: [짧은 하회전] — 안전한 오프닝','player');setBall({row:1,col,spin:'BACKSPIN'});setTurn('OPPONENT');break;
          case 'SERVE_LONG_FAST': useSkill(action);addLog('나: [긴 빠른 상회전] — 기습!','player');setBall({row:0,col,spin:'FAST_TOP'});setTurn('OPPONENT');break;
          case 'SERVE_SHORT_TOP': useSkill(action);addLog('나: [짧은 상회전] — 커트 함정','player');setBall({row:1,col,spin:'TOPSPIN'});setTurn('OPPONENT');break;
          case 'SERVE_SHORT_SIDE': useSkill(action);addLog('나: [짧은 횡회전] — 방향 혼란','player');setBall({row:1,col,spin:'SIDESPIN'});setTurn('OPPONENT');break;
          case 'SERVE_LONG_BACK': useSkill(action);addLog('나: [긴 하회전] — 깊고 낮게','player');setBall({row:0,col,spin:'LONG_BACK'});setTurn('OPPONENT');break;
          case 'SERVE_LONG_SIDE': useSkill(action);addLog('나: [긴 횡회전] — 깊은 사이드스핀','player');setBall({row:0,col,spin:'LONG_SIDE'});setTurn('OPPONENT');break;
          case 'SERVE_SHORT_SIDE_BACK': useSkill(action);addLog('나: [짧은 횡하회전] — 복합 회전','player');setBall({row:1,col,spin:'SIDESPIN_BACK'});setTurn('OPPONENT');break;
          case 'SERVE_SHORT_SIDE_TOP': useSkill(action);addLog('나: [짧은 횡상회전] — 복합 속임수','player');setBall({row:1,col,spin:'SIDESPIN_TOP'});setTurn('OPPONENT');break;
          case 'SERVE_KNUCKLE': useSkill(action);addLog('나: [너클] — 무회전 불규칙!','player');setBall({row:1,col,spin:'KNUCKLE'});setTurn('OPPONENT');break;
          case 'SERVE_DOUBLE_BOUNCE': useSkill(action);addLog('나: [더블 바운드] — 두 번 튕김!','player');setBall({row:1,col,spin:'DOUBLE_BOUNCE'});setTurn('OPPONENT');break;
          case 'STOP': useSkill(action);addLog('나: [스톱] 네트 앞에 놓습니다.','player');setBall({row:1,col,spin:'BACKSPIN'});setTurn('OPPONENT');break;
          case 'PUSH': useSkill(action);addLog('나: [보스커트] 깊숙이 찌릅니다.','player');setBall({row:0,col,spin:'BACKSPIN'});setTurn('OPPONENT');break;
          case 'CUT': useSkill(action);addLog('나: [맞커트] 길게 깎아 보냅니다.','player');setBall({row:0,col,spin:'BACKSPIN'});setTurn('OPPONENT');break;
          case 'SHORT_BLOCK': useSkill(action);addLog('나: [쇼트] 짧게 밀어냅니다.','player');setBall({row:1,col,spin:'BACKSPIN'});setTurn('OPPONENT');break;
          case 'LOB': { useSkill(action); const lobLv=skills['LOB']?.lv??1, aiSmashPenalty=lvBonus(lobLv); addLog(`나: 🪂 [로빙] 높이 올립니다! (AI 스매시 성공률 -${Math.round(aiSmashPenalty*100)}%)`,'player'); setBall({row:0,col,spin:'LOB_SPIN',lobPenalty:aiSmashPenalty}); setTurn('OPPONENT'); break; }
          case 'BLOCK': { useSkill(action); const hard=ball?.spin==='FAST_TOP'||ball?.spin==='POWER_SPIN', base=hard?0.35:0.62, chance=applyBonus(base,'BLOCK'); addLog(`나: 🛡️ [블록] — ${hard?'파워에 밀릴 수 있습니다!':'공이 뜨게 넘깁니다.'}`,'player'); if (Math.random()<chance){addLog('🎲 블록 성공 — 공이 떠서 넘어갑니다.','player');setBall({row:Math.random()>0.5?1:0,col,spin:'BLOCK_RETURN'});setTurn('OPPONENT');}else{addLog('🎲 방어 실패!','system');winPoint('opponent');} break; }
          default: break;
        }
      };

      useEffect(() => {
        if (turn==='OPPONENT'&&gameState==='PLAYING') { const t=setTimeout(executeOpponentTurn,1500); return ()=>clearTimeout(t); }
      }, [turn,gameState,ball]);

      const executeOpponentTurn = () => {
        const col=rc();
        if (!ball) {
          const r=Math.random();
          if(r<0.17){addLog('상대: [짧은 하회전 서브]','opponent');setBall({row:2,col,spin:'BACKSPIN'});}
          else if(r<0.28){addLog('상대: 기습! [긴 빠른 상회전 서브]!','opponent');setBall({row:3,col,spin:'FAST_TOP'});}
          else if(r<0.38){addLog('상대: [짧은 상회전 서브] 속임수','opponent');setBall({row:2,col,spin:'TOPSPIN'});}
          else if(r<0.46){addLog('상대: [짧은 횡회전 서브]!','opponent');setBall({row:2,col,spin:'SIDESPIN'});}
          else if(r<0.54){addLog('상대: [긴 하회전 서브] 낮고 깊게!','opponent');setBall({row:3,col,spin:'LONG_BACK'});}
          else if(r<0.61){addLog('상대: [긴 횡회전 서브]!','opponent');setBall({row:3,col,spin:'LONG_SIDE'});}
          else if(r<0.69){addLog('상대: [짧은 횡하회전 서브]!','opponent');setBall({row:2,col,spin:'SIDESPIN_BACK'});}
          else if(r<0.76){addLog('상대: [짧은 횡상회전 서브]!','opponent');setBall({row:2,col,spin:'SIDESPIN_TOP'});}
          else if(r<0.83){addLog('상대: ⚪ [너클 서브]!','opponent');setBall({row:2,col,spin:'KNUCKLE'});}
          else{addLog('상대: 🏀 [더블 바운드 서브]!','opponent');setBall({row:2,col,spin:'DOUBLE_BOUNCE'});}
          setTurn('PLAYER'); return;
        }
        const {row,spin}=ball, aiToCol=rc(), aiFromCol=ball.col;
        const dirLabel=aiFromCol!==aiToCol?(row<=1?'깊은 크로스':'크로스'):'스트레이트';
        if (spin==='LOB_SPIN'){const penalty=ball.lobPenalty??0,smashChance=Math.max(0.50,0.90-penalty);addLog(`상대: 로빙! 💥 스매시! (성공률 ${Math.round(smashChance*100)}%)`,'opponent');if(Math.random()<smashChance){setBall({row:3,col:aiToCol,spin:'POWER_SPIN',fromRow:row,fromCol:aiFromCol});setTurn('PLAYER');}else{addLog('상대: 스매시 미스!','system');winPoint('player');}return;}
        if (spin==='BLOCK_RETURN'){addLog('상대: 뜬 공! 🔥 드라이브!','opponent');const chance=calcChance(0.88,aiFromCol,row,aiToCol);if(Math.random()<chance){setBall({row:3,col:aiToCol,spin:'TOPSPIN',fromRow:row,fromCol:aiFromCol});setTurn('PLAYER');}else{addLog('상대: 아웃!','system');winPoint('player');}return;}
        if (spin==='TOPSPIN'||spin==='FAST_TOP'||spin==='LOOP_SPIN'||spin==='POWER_SPIN'){
          if(spin==='POWER_SPIN'){addLog('상대: 💥 파워드라이브! [블록] 시도!','opponent');if(Math.random()<0.30){setBall({row:Math.random()>0.5?2:3,col:aiToCol,spin:'BLOCK_RETURN',fromRow:row,fromCol:aiFromCol});setTurn('PLAYER');}else{addLog('상대: 파워에 밀렸다!','system');winPoint('player');}return;}
          if(spin==='LOOP_SPIN'){addLog('상대: 루프 회전!','opponent');if(Math.random()<0.5){addLog('상대: [블록] — 회전에 밀려 뜹니다.','opponent');if(Math.random()<0.50){setBall({row:Math.random()>0.5?2:3,col:aiToCol,spin:'BLOCK_RETURN',fromRow:row,fromCol:aiFromCol});setTurn('PLAYER');}else{addLog('상대: 블록 미스!','system');winPoint('player');}}else{addLog(`상대: 🌀 [카운터] ${dirLabel}!`,'opponent');if(Math.random()<calcChance(0.48,aiFromCol,row,aiToCol)){setBall({row:3,col:aiToCol,spin:'TOPSPIN',fromRow:row,fromCol:aiFromCol});setTurn('PLAYER');}else{addLog('상대: 카운터 미스!','system');winPoint('player');}}return;}
          const r2=Math.random();
          if(r2<0.30){addLog('상대: 🛡️ [블록]','opponent');if(Math.random()<(spin==='FAST_TOP'?0.35:0.62)){setBall({row:Math.random()>0.5?2:3,col:aiToCol,spin:'BLOCK_RETURN',fromRow:row,fromCol:aiFromCol});setTurn('PLAYER');}else{addLog('상대: 블록 미스!','system');winPoint('player');}}
          else if(r2<0.65){addLog(`상대: 🌀 [카운터] ${dirLabel}!`,'opponent');if(Math.random()<calcChance(0.55,aiFromCol,row,aiToCol)){setBall({row:3,col:aiToCol,spin:'TOPSPIN',fromRow:row,fromCol:aiFromCol});setTurn('PLAYER');}else{addLog('상대: 카운터 미스!','system');winPoint('player');}}
          else{addLog('상대: 🪂 [로빙] — 높게 올립니다!','opponent');setBall({row:3,col:aiToCol,spin:'LOB_SPIN',lobPenalty:0,fromRow:row,fromCol:aiFromCol});setTurn('PLAYER');}
          return;
        }
        if (row===1){
          if(spin==='BACKSPIN'||spin==='SIDESPIN'||spin==='SIDESPIN_BACK'){const r=Math.random();if(r<0.22){addLog('상대: [스톱]','opponent');setBall({row:2,col:aiToCol,spin:'BACKSPIN'});}else if(r<0.44){addLog('상대: [보스커트]','opponent');setBall({row:3,col:aiToCol,spin:'BACKSPIN'});}else if(r<0.58){addLog('상대: [쇼트]','opponent');setBall({row:2,col:aiToCol,spin:'BACKSPIN'});}else if(r<0.78){addLog(`상대: ⚡ [플릭] ${dirLabel}!`,'opponent');if(Math.random()<calcChance(0.60,aiFromCol,row,aiToCol)){setBall({row:3,col:aiToCol,spin:'TOPSPIN',fromRow:row,fromCol:aiFromCol});}else{addLog('상대: 플릭 미스!','system');winPoint('player');return;}}else{addLog(`상대: 🎯 [치키타] ${dirLabel}!`,'opponent');if(Math.random()<calcChance(0.55,aiFromCol,row,aiToCol)){setBall({row:3,col:aiToCol,spin:'TOPSPIN',fromRow:row,fromCol:aiFromCol});}else{addLog('상대: 치키타 미스!','system');winPoint('player');return;}}}
          else if(spin==='TOPSPIN'||spin==='SIDESPIN_TOP'){addLog(`상대: ${spin==='SIDESPIN_TOP'?'횡상회전에 속아!':'상회전에 속았습니다!'}`,'opponent');addLog('공이 붕 뜹니다! 스매시 찬스!','system');setBall({row:2,col:aiToCol,spin:'FLOAT'});}
          else if(spin==='KNUCKLE'){addLog('상대: ⚪ 너클 바운드...','opponent');if(Math.random()<0.30){addLog('상대: 리시브 미스!','system');winPoint('player');return;}if(Math.random()<0.5){addLog('상대: [스톱]','opponent');setBall({row:2,col:aiToCol,spin:'BACKSPIN'});}else{addLog('상대: [보스커트]','opponent');setBall({row:3,col:aiToCol,spin:'BACKSPIN'});}}
          else if(spin==='DOUBLE_BOUNCE'){addLog('상대: 더블바운드! 처리 어렵다...','opponent');if(Math.random()<0.35){addLog('상대: 네트 에러!','system');winPoint('player');return;}if(Math.random()<0.5){addLog('상대: [스톱] 간신히','opponent');setBall({row:2,col:aiToCol,spin:'BACKSPIN'});}else{addLog('상대: [보스커트]','opponent');setBall({row:3,col:aiToCol,spin:'BACKSPIN'});}}
          setTurn('PLAYER'); return;
        }
        if (row===0){
          if(spin==='FAST_TOP'){addLog('상대: 당황! [블록]','opponent');if(Math.random()>0.55){setBall({row:3,col:aiToCol,spin:'TOPSPIN'});setTurn('PLAYER');}else{addLog('서브 에이스!','system');winPoint('player');}return;}
          if(spin==='LONG_BACK'||spin==='BACKSPIN'){const r=Math.random();if(r<0.28){addLog('상대: [맞커트]','opponent');setBall({row:3,col:aiToCol,spin:'BACKSPIN'});setTurn('PLAYER');}else if(r<0.50){addLog(`상대: 🔥 [드라이브] ${dirLabel}!`,'opponent');if(Math.random()<calcChance(0.70,aiFromCol,row,aiToCol)){setBall({row:3,col:aiToCol,spin:'TOPSPIN',fromRow:row,fromCol:aiFromCol});setTurn('PLAYER');}else{addLog('상대: 드라이브 네트!','system');winPoint('player');}}else if(r<0.75){addLog(`상대: 🌀 [루프] ${dirLabel}!`,'opponent');if(Math.random()<calcChance(0.65,aiFromCol,row,aiToCol)){setBall({row:3,col:aiToCol,spin:'LOOP_SPIN',fromRow:row,fromCol:aiFromCol});setTurn('PLAYER');}else{addLog('상대: 루프 네트!','system');winPoint('player');}}else{addLog(`상대: 💥 [파워드라이브] ${dirLabel}!`,'opponent');if(Math.random()<calcChance(0.60,aiFromCol,row,aiToCol)){setBall({row:3,col:aiToCol,spin:'POWER_SPIN',fromRow:row,fromCol:aiFromCol});setTurn('PLAYER');}else{addLog('상대: 파워드라이브 아웃!','system');winPoint('player');}}return;}
          if(spin==='LONG_SIDE'){addLog('상대: 긴 횡회전...','opponent');if(Math.random()<0.22){addLog('상대: 방향 오판! 에러!','system');winPoint('player');return;}if(Math.random()<0.5){addLog('상대: [맞커트]','opponent');setBall({row:3,col:aiToCol,spin:'BACKSPIN'});}else{addLog(`상대: [드라이브] ${dirLabel}!`,'opponent');if(Math.random()<calcChance(0.62,aiFromCol,row,aiToCol)){setBall({row:3,col:aiToCol,spin:'TOPSPIN',fromRow:row,fromCol:aiFromCol});}else{addLog('상대: 드라이브 네트!','system');winPoint('player');return;}}setTurn('PLAYER');return;}
          if(spin==='KNUCKLE'){addLog('상대: ⚪ 너클 바운드...','opponent');if(Math.random()<0.35){addLog('상대: 에러!','system');winPoint('player');return;}addLog('상대: [블록]으로 간신히','opponent');setBall({row:3,col:aiToCol,spin:'BLOCK_RETURN'});setTurn('PLAYER');return;}

      const spinMeta = {

        BLOCK_RETURN:{label:'🫧 블록뜬공',color:'#7dd3fc',glow:'rgba(125,211,252,0.85)',pulse:true},

      const renderTableWithPath = () => {
        const cellH=72,cellW=100,W=200,H=288;

        })():null;

                const here=ball?.row===r&&ball?.col===c,isFrom=ball?.fromRow===r&&ball?.fromCol===c;
                const meta=here?(spinMeta[ball.spin]||spinMeta.BACKSPIN):null;
                return(<div key={`${r}-${c}`} style={{position:'relative',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:`${cellH}px`,borderRight:c===0?'1px solid rgba(255,255,255,0.2)':'none',borderBottom:r<3?'1px solid rgba(255,255,255,0.12)':'none',borderTop:r===2?'3px solid rgba(255,255,255,0.85)':'none',background:here?'rgba(255,255,255,0.08)':isFrom?'rgba(255,255,255,0.03)':'transparent'}}>
                  {!here&&<span style={{fontSize:'9px',color:'rgba(255,255,255,0.12)',fontWeight:700,userSelect:'none'}}>{r<=1?'상대':'내'}{r%2===0?' 긴':' 짧'}</span>}
                  {here&&meta&&(<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'4px'}}><div style={{width:'26px',height:'26px',borderRadius:'50%',background:meta.color,border:'1.5px solid rgba(255,255,255,0.4)',boxShadow:`0 0 18px 7px ${meta.glow}`,animation:meta.pulse?'bpulse 0.9s infinite':'bbounce 0.55s infinite alternate'}}/><span style={{fontSize:'9px',fontWeight:700,color:'#fff',background:'rgba(0,0,0,0.75)',padding:'1px 6px',borderRadius:'4px',whiteSpace:'nowrap'}}>{meta.label}</span></div>)}

      const btnBase = {border:'none',cursor:'pointer',borderRadius:'8px',fontWeight:700,transition:'all 0.15s',fontFamily:'inherit',lineHeight:1.3,touchAction:'manipulation',WebkitTapHighlightColor:'transparent',minHeight:'44px'};

      const getButtons = () => {

        const {row,spin}=ball;
        const shortDefensive=[mk('스톱','STOP','#334155','네트 앞'),mk('쇼트','SHORT_BLOCK','#1e3a5f','짧게 밀기'),mk('보스커트','PUSH','#334155','깊이 찌르기')];
        const shortAttack=[mk('플릭 ⚡','FLICK','#92400e','선제공격'),mk('치키타','CHIQUITA','#7c3aed','BH 커브')];
        const shortBackBtns=[...shortDefensive,...shortAttack];
        const shortTopBtns=[...shortAttack,mk('스톱 ⚠','STOP','#1e293b','공 뜰 수 있음'),mk('보스커트','PUSH','#334155','길게 밀기')];
        if(row===2&&spin==='BACKSPIN') return shortBackBtns;
        if(row===2&&spin==='TOPSPIN') return shortTopBtns;
        if(row===2&&spin==='SIDESPIN') return shortBackBtns;

        if(row===2&&spin==='SIDESPIN_TOP') return shortTopBtns;
        if(row===2&&spin==='KNUCKLE') return [mk('스톱','STOP','#334155','조심'),mk('쇼트','SHORT_BLOCK','#1e3a5f','짧게'),mk('보스커트','PUSH','#334155','깊이'),mk('플릭 ⚡','FLICK','#92400e','⚠불규칙')];
        if(row===2&&spin==='DOUBLE_BOUNCE') return [mk('스톱','STOP','#334155','⚠매우짧음'),mk('쇼트','SHORT_BLOCK','#1e3a5f','빠르게'),mk('플릭 ⚡','FLICK','#92400e','⚠어려움')];
        if(row===2&&(spin==='BLOCK_RETURN'||spin==='FLOAT')) return [mk('💥 스매시 찬스!','SMASH','#854d0e',null,true)];
        const longBackBtns=[mk('맞커트','CUT','#334155','안전 수비'),mk('🔥 드라이브','DRIVE','#9a3412','방향 선택'),mk('🌀 루프','LOOP','#b45309','강한 회전'),mk('💥 파워드라이브','POWER_DRIVE','#7f1d1d','강타'),mk('🔵 BH드라이브','BH_DRIVE','#1e40af','백핸드')];
        if(row===3&&(spin==='BACKSPIN'||spin==='LONG_BACK'||spin==='SIDESPIN_BACK')) return longBackBtns;
        if(row===3&&(spin==='SIDESPIN'||spin==='LONG_SIDE')) return [mk('맞커트','CUT','#334155','방향 주의'),mk('🔥 드라이브','DRIVE','#9a3412','방향 선택'),mk('🌀 루프','LOOP','#b45309','강한 회전')];
        if(row===3&&spin==='KNUCKLE') return [mk('맞커트','CUT','#334155','⚠불규칙'),mk('🔥 드라이브','DRIVE','#9a3412','⚠어려움')];
        if(row===3&&(spin==='TOPSPIN'||spin==='FAST_TOP'||spin==='LOOP_SPIN')) return [mk('🛡️ 블록','BLOCK','#0c4a6e',spin==='LOOP_SPIN'?'루프!뜬공주의':spin==='FAST_TOP'?'빠른서브':'뜬공주의',true),mk('🌀 카운터','COUNTER_DRIVE','#4a1d96','방향 선택 →',true),mk('🪂 로빙','LOB','#164e63','높게 올리기',true)];
        if(row===3&&spin==='POWER_SPIN') return [mk('🛡️ 블록 (위험!)','BLOCK','#7f1d1d','성공률 30%',true),mk('🪂 로빙','LOB','#164e63','피하기',true)];
        if(row===3&&spin==='BLOCK_RETURN') return [mk('🔥 드라이브 (뜬공!)','DRIVE','#b45309','+15% 찬스',true),mk('🛡️ 블록 (뜬공루프)','BLOCK','#164e63','뜬공 반복',true)];
        if(row===3&&spin==='LOB_SPIN') return [mk('💥 스매시! (로빙)','SMASH','#854d0e','성공률 92%!',true)];

      const renderDirectionPanel = () => {
        if(!pendingAttack||!ball) return null;
        const fromCol=ball.col,fromRow=ball.row,bc=pendingAttack.baseChance;
        const crossPct=Math.round(Math.min(0.97,bc+0.05)*100);

          <style>{`

            *{box-sizing:border-box}
          `}</style>
          {levelUpFlash&&(<div style={{position:'fixed',top:'20px',left:'50%',transform:'translateX(-50%)',background:'linear-gradient(135deg,#854d0e,#f59e0b)',color:'#fff',padding:'10px 22px',borderRadius:'12px',fontWeight:900,fontSize:'14px',zIndex:100,boxShadow:'0 4px 24px rgba(245,158,11,0.5)',animation:'lvflash 0.4s ease',whiteSpace:'nowrap'}}>🆙 {SKILL_NAMES[levelUpFlash.skill]} Lv{levelUpFlash.newLv} 달성!</div>)}
          <div style={{width:'100%',maxWidth:'480px',background:'rgba(15,23,42,0.95)',borderRadius:'10px',padding:'6px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px',border:'1px solid rgba(148,163,184,0.12)'}}>
            <div style={{display:'flex',alignItems:'center',gap:'6px'}}><span style={{fontSize:'11px',color:'#94a3b8'}}>상대</span><span style={{fontSize:'26px',fontWeight:900,color:'#f87171',lineHeight:1}}>{score.opponent}</span>{server==='OPPONENT'&&<span style={{fontSize:'9px',color:'#fca5a5',background:'rgba(239,68,68,0.15)',padding:'1px 5px',borderRadius:'10px'}}>🏓</span>}</div>
            <div style={{fontSize:'11px',fontWeight:700,color:'#334155'}}>vs</div>
            <div style={{display:'flex',alignItems:'center',gap:'6px'}}>{server==='PLAYER'&&<span style={{fontSize:'9px',color:'#93c5fd',background:'rgba(96,165,250,0.15)',padding:'1px 5px',borderRadius:'10px'}}>🏓</span>}<span style={{fontSize:'26px',fontWeight:900,color:'#60a5fa',lineHeight:1}}>{score.player}</span><span style={{fontSize:'11px',color:'#94a3b8'}}>나</span></div>
          </div>
          {gameState==='START'?(
            <div style={{width:'100%',maxWidth:'420px',background:'rgba(30,41,59,0.92)',borderRadius:'16px',padding:'28px 22px',border:'1px solid rgba(148,163,184,0.14)',boxShadow:'0 8px 32px rgba(0,0,0,0.5)',marginTop:'16px'}}>
              <h1 style={{fontSize:'27px',fontWeight:900,textAlign:'center',marginBottom:'6px',background:'linear-gradient(135deg,#60a5fa,#818cf8)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>🏓 MindTT</h1>
              <p style={{textAlign:'center',color:'#64748b',fontSize:'12px',marginBottom:'16px'}}>전술적 탁구 — 서브·경로·레벨업으로 상대를 제압하라</p>
              <div style={{background:'rgba(15,23,42,0.7)',borderRadius:'10px',padding:'14px',marginBottom:'16px',display:'flex',flexDirection:'column',gap:'5px'}}>
                <p style={{fontWeight:700,fontSize:'12px',marginBottom:'4px',color:'#cbd5e1'}}>📋 시스템 가이드</p>
                {[['#60a5fa','짧은 하회전','정석. 안전.'],['#fb923c','짧은 상회전','커트 함정.'],['#a78bfa','횡회전 계열','방향 혼란.'],['#6ee7b7','더블 바운드','매우 짧음. AI 에러 유발.'],['#94a3b8','너클','불규칙 바운드. AI 에러 유발.'],['#ef4444','긴 빠른 상회전','기습 에이스.'],['#fde047','긴 하회전','낮고 깊게.'],['#818cf8','긴 횡회전','깊은 사이드스핀.'],['#34d399','크로스','자연스러운 방향 +5%.'],['#fbbf24','스트레이트','방향 전환. 깊을수록 ↓'],['#bae6fd','로빙','수비용. 레벨업할수록 AI 스매시 성공률 ↓'],['#fde68a','레벨업','기술 반복 → 성공률 ↑']].map(([c,l,d])=>(<div key={l} style={{display:'flex',gap:'8px',alignItems:'flex-start'}}><span style={{width:'7px',height:'7px',borderRadius:'50%',background:c,marginTop:'3px',flexShrink:0}}/><span style={{color:'#94a3b8',fontSize:'11px'}}><b style={{color:c}}>{l}:</b> {d}</span></div>))}
              </div>
              <button onClick={startGame} className="gbtn" style={{...btnBase,width:'100%',padding:'14px',background:'linear-gradient(135deg,#3b82f6,#6366f1)',color:'#fff',fontSize:'16px'}}>게임 시작 (5점 내기)</button>
            </div>
          ):(
            <div style={{width:'100%',maxWidth:'480px',display:'flex',flexDirection:'column',gap:'6px'}}>
              {renderTableWithPath()}
              <div style={{height:'110px',background:'rgba(2,6,23,0.92)',borderRadius:'10px',padding:'6px 12px',overflowY:'auto',fontSize:'12px',border:'1px solid rgba(148,163,184,0.1)',display:'flex',flexDirection:'column',gap:'2px'}}>
                {logs.map((log,i)=>(<div key={i} style={{color:log.type==='player'?'#93c5fd':log.type==='opponent'?'#fca5a5':'#fde68a',fontWeight:log.type==='system'||log.type==='levelup'?700:400,textAlign:log.type==='system'||log.type==='levelup'?'center':'left',padding:log.type==='system'||log.type==='levelup'?'2px 0':0}}>{log.text}</div>))}
                <div ref={logsEndRef}/>
              </div>
              <div style={{background:'rgba(30,41,59,0.92)',borderRadius:'12px',padding:'10px',border:'1px solid rgba(148,163,184,0.1)',minHeight:'110px',display:'flex',alignItems:'center',justifyContent:'center'}}>
                {gameState==='GAME_OVER'?(<button onClick={startGame} className="gbtn" style={{...btnBase,width:'100%',padding:'12px',background:'#4f46e5',color:'#fff',fontSize:'15px'}}>다시 하기</button>)
                :turn==='OPPONENT'?(<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'8px',color:'#64748b'}}><div style={{width:'24px',height:'24px',border:'2px solid #475569',borderTopColor:'transparent',borderRadius:'50%',animation:'bspin 0.8s linear infinite'}}/><span style={{fontSize:'13px',fontWeight:700}}>상대방이 생각 중...</span></div>)
                :pendingAttack?renderDirectionPanel()
                :!ball?renderServePanel()
                :buttons&&buttons.length>0?(<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',width:'100%'}}>{buttons.map(({label,action,color,sub,full})=>(<button key={action} onClick={()=>handlePlayerAction(action)} className="gbtn" style={{...btnBase,gridColumn:full?'1/-1':undefined,padding:action==='SMASH'?'16px':'11px 8px',background:color,color:action==='SMASH'?'#000':'#fff',fontSize:'13px',border:action==='BLOCK'?'2px solid #0ea5e9':action==='COUNTER_DRIVE'?'2px solid #7c3aed':'none',boxShadow:action==='SMASH'?'0 0 20px rgba(234,179,8,0.4)':'none'}}>{label}{sub&&<><br/><span style={{fontWeight:400,opacity:0.75,fontSize:'10px'}}>{sub}</span></>}</button>))}</div>)
                :(<div style={{color:'#475569',fontSize:'12px'}}>...</div>)}
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<TableTennisChess />);
  </script>
</body>
</html>
